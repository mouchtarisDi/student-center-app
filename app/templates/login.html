{% extends "base.html" %}

{% block title %}Login | KidsLogix{% endblock %}

{% block content %}
<div class="auth-wrap">
  <div class="card auth-card">
    <div class="card-head">
      <div class="card-title">
        <span class="material-icons-outlined">lock</span>
        <h2>Σύνδεση</h2>
      </div>
    </div>

    <div class="card-body">
      {% if request.query_params.get('error') %}
        <div class="alert" style="margin-bottom:14px;">
          <b>Λάθος στοιχεία.</b> Δοκίμασε ξανά.
        </div>
      {% endif %}

      <form method="post" action="/auth/web-login" class="form-grid">
        <label class="field">
          <span>Username</span>
          <input name="username" autocomplete="username" required />
        </label>

        <label class="field">
          <span>Password</span>
          <div class="pwd-row">
            <input id="pwd" name="password" type="password" autocomplete="current-password" required />
            <button class="btn btn-xs" type="button" onclick="togglePwd()" title="Εμφάνιση/Απόκρυψη">
              <span class="material-icons-outlined" id="pwdIcon">visibility</span>
            </button>
          </div>
        </label>

        <div class="form-actions">
          <button class="btn btn-primary" type="submit">
            <span class="material-icons-outlined">login</span>
            Είσοδος
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
  function togglePwd(){
    const input = document.getElementById('pwd');
    const ic = document.getElementById('pwdIcon');
    if (!input) return;
    const next = (input.type === 'password') ? 'text' : 'password';
    input.type = next;
    if (ic) ic.textContent = (next === 'password') ? 'visibility' : 'visibility_off';
  }
</script>
{% endblock %}
